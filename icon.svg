<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sfondo con angoli arrotondati -->
  <rect width="512" height="512" rx="96" fill="#1565C0"/>

  <!-- Barre del barcode (stile realistico) -->
  <rect x="52"  y="110" width="18"  height="220" rx="4" fill="white" opacity="0.95"/>
  <rect x="80"  y="110" width="9"   height="220" rx="2" fill="white" opacity="0.95"/>
  <rect x="99"  y="110" width="22"  height="220" rx="4" fill="white" opacity="0.95"/>
  <rect x="132" y="110" width="12"  height="220" rx="3" fill="white" opacity="0.95"/>
  <rect x="155" y="110" width="18"  height="220" rx="4" fill="white" opacity="0.95"/>
  <rect x="185" y="110" width="28"  height="220" rx="5" fill="white" opacity="0.95"/>
  <rect x="224" y="110" width="9"   height="220" rx="2" fill="white" opacity="0.95"/>
  <rect x="244" y="110" width="18"  height="220" rx="4" fill="white" opacity="0.95"/>
  <rect x="273" y="110" width="12"  height="220" rx="3" fill="white" opacity="0.95"/>
  <rect x="296" y="110" width="22"  height="220" rx="4" fill="white" opacity="0.95"/>
  <rect x="329" y="110" width="9"   height="220" rx="2" fill="white" opacity="0.95"/>
  <rect x="349" y="110" width="18"  height="220" rx="4" fill="white" opacity="0.95"/>
  <rect x="379" y="110" width="28"  height="220" rx="5" fill="white" opacity="0.95"/>
  <rect x="418" y="110" width="9"   height="220" rx="2" fill="white" opacity="0.95"/>
  <rect x="438" y="110" width="18"  height="220" rx="4" fill="white" opacity="0.95"/>

  <!-- Numero sotto le barre (stile EAN) -->
  <text x="256" y="375" font-family="'Courier New', monospace" font-size="38"
        fill="white" text-anchor="middle" opacity="0.75" letter-spacing="3">
    8 00100 12345 6
  </text>

  <!-- Testo "MagMa" in basso -->
  <text x="256" y="458" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="72" font-weight="800" fill="white" text-anchor="middle"
        letter-spacing="6">
    MagMa
  </text>
</svg>
